services:
  specimen-app:
    build: .
    container_name: specimen-runtime-prod
    ports:
      - "8085:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_ENV=production
      - NEXT_PUBLIC_APP_VERSION=0.1.5
      - NEXT_PUBLIC_APP_BUILD=2026.05.09-PROD
