<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minesweeper</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #c0c0c0;
  font-family: 'MS Sans Serif', Arial, sans-serif;
  font-size: 11px;
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 6px;
}
.frame {
  background: #c0c0c0;
  border: 3px solid;
  border-color: #ffffff #808080 #808080 #ffffff;
  box-shadow: 1px 1px 0 #000000;
  padding: 6px;
  display: inline-block;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 6px;
  margin-bottom: 6px;
  border: 2px solid;
  border-color: #808080 #ffffff #ffffff #808080;
  background: #c0c0c0;
}
.lcd {
  background: #000;
  color: #f00;
  font-family: 'Courier New', monospace;
  font-size: 20px;
  font-weight: bold;
  width: 44px;
  text-align: right;
  padding: 2px 4px;
  border: 2px solid;
  border-color: #808080 #ffffff #ffffff #808080;
  letter-spacing: 1px;
}
#reset-btn {
  width: 28px;
  height: 28px;
  font-size: 16px;
  cursor: pointer;
  background: #c0c0c0;
  border: 2px solid;
  border-color: #ffffff #808080 #808080 #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  outline: none;
}
#reset-btn:active {
  border-color: #808080 #ffffff #ffffff #808080;
}
.board-frame {
  border: 3px solid;
  border-color: #808080 #ffffff #ffffff #808080;
  display: inline-block;
  line-height: 0;
}
.row { display: flex; }
.cell {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: bold;
  flex-shrink: 0;
  cursor: pointer;
}
.cell.closed {
  background: #c0c0c0;
  border: 2px solid;
  border-color: #ffffff #808080 #808080 #ffffff;
}
.cell.open {
  background: #c0c0c0;
  border: 1px solid #808080;
  cursor: default;
}
.cell.mine-hit { background: #f00; border: 1px solid #808080; }
.cell.mine-show { background: #c0c0c0; border: 1px solid #808080; }
.cell.wrong-flag { background: #c0c0c0; border: 1px solid #808080; }
.n1 { color: #0000ff; }
.n2 { color: #007b00; }
.n3 { color: #ff0000; }
.n4 { color: #00007b; }
.n5 { color: #7b0000; }
.n6 { color: #007b7b; }
.n7 { color: #000000; }
.n8 { color: #7b7b7b; }
.menubar {
  display: flex;
  background: #c0c0c0;
  margin-bottom: 4px;
  width: 100%;
}
.menu-item {
  padding: 2px 8px;
  cursor: default;
  position: relative;
  font-size: 11px;
}
.menu-item:hover { background: #000080; color: #fff; }
.dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: #c0c0c0;
  border: 2px solid;
  border-color: #ffffff #808080 #808080 #ffffff;
  box-shadow: 2px 2px 0 #000;
  z-index: 100;
  min-width: 140px;
}
.menu-item:hover .dropdown { display: block; }
.dropdown-item {
  padding: 3px 20px;
  cursor: default;
  white-space: nowrap;
  font-size: 11px;
}
.dropdown-item:hover { background: #000080; color: #fff; }
.dropdown-sep { height: 1px; background: #808080; margin: 2px 4px; }
</style>
</head>
<body>
<div class="menubar">
  <div class="menu-item">Game
    <div class="dropdown">
      <div class="dropdown-item" onclick="newGame('beginner')">New Game</div>
      <div class="dropdown-sep"></div>
      <div class="dropdown-item" onclick="setLevel('beginner')">Beginner</div>
      <div class="dropdown-item" onclick="setLevel('intermediate')">Intermediate</div>
      <div class="dropdown-item" onclick="setLevel('expert')">Expert</div>
    </div>
  </div>
</div>

<div class="frame">
  <div class="header">
    <div class="lcd" id="mine-count">010</div>
    <button id="reset-btn" onclick="newGame()">🙂</button>
    <div class="lcd" id="timer">000</div>
  </div>
  <div class="board-frame">
    <div id="board"></div>
  </div>
</div>

<script>
const LEVELS = {
  beginner:     { rows: 9,  cols: 9,  mines: 10 },
  intermediate: { rows: 16, cols: 16, mines: 40 },
  expert:       { rows: 16, cols: 30, mines: 99 },
};

let level = 'beginner';
let cfg = LEVELS[level];
let board, revealed, flagged, question, mineSet;
let state = 'idle';
let timerVal = 0;
let timerId = null;
let firstClick = true;

function lcd(n) {
  n = Math.max(-99, Math.min(999, n));
  if (n < 0) return '-' + String(Math.abs(n)).padStart(2, '0');
  return String(n).padStart(3, '0');
}

function setLevel(l) { level = l; cfg = LEVELS[l]; newGame(); }

function newGame() {
  clearInterval(timerId);
  timerVal = 0; firstClick = true; state = 'idle';
  const { rows, cols, mines } = cfg;
  board    = Array.from({ length: rows }, () => Array(cols).fill(0));
  revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
  flagged  = Array.from({ length: rows }, () => Array(cols).fill(false));
  question = Array.from({ length: rows }, () => Array(cols).fill(false));
  mineSet  = new Set();
  document.getElementById('mine-count').textContent = lcd(mines);
  document.getElementById('timer').textContent = '000';
  document.getElementById('reset-btn').textContent = '🙂';
  buildDOM();
}

function placeMines(safeR, safeC) {
  const { rows, cols, mines } = cfg;
  const safe = new Set();
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const nr = safeR + dr, nc = safeC + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols)
        safe.add(nr * cols + nc);
    }
  while (mineSet.size < mines) {
    const p = Math.floor(Math.random() * rows * cols);
    if (!safe.has(p)) mineSet.add(p);
  }
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (mineSet.has(r * cols + c)) board[r][c] = -1;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      if (board[r][c] === -1) continue;
      let n = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) n++;
        }
      board[r][c] = n;
    }
}

function startTimer() {
  timerId = setInterval(() => {
    timerVal = Math.min(999, timerVal + 1);
    document.getElementById('timer').textContent = lcd(timerVal);
  }, 1000);
}

function flood(r, c) {
  const { rows, cols } = cfg;
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  if (board[r][c] === 0)
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        if (dr || dc) flood(r + dr, c + dc);
}

function onLeft(r, c) {
  if (state === 'won' || state === 'lost') return;
  if (flagged[r][c]) return;
  if (revealed[r][c]) {
    // chord
    let adj = 0;
    const { rows, cols } = cfg;
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && flagged[nr][nc]) adj++;
      }
    if (adj !== board[r][c]) return;
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
        if (flagged[nr][nc] || revealed[nr][nc]) continue;
        if (board[nr][nc] === -1) { lose(nr, nc); return; }
        flood(nr, nc);
      }
    checkWin(); renderAll(); return;
  }
  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    state = 'playing';
    startTimer();
  }
  if (board[r][c] === -1) { lose(r, c); return; }
  flood(r, c);
  checkWin();
  renderAll();
}

function onRight(e, r, c) {
  e.preventDefault();
  if (state === 'won' || state === 'lost' || revealed[r][c]) return;
  if (!flagged[r][c] && !question[r][c]) { flagged[r][c] = true; }
  else if (flagged[r][c]) { flagged[r][c] = false; question[r][c] = true; }
  else { question[r][c] = false; }
  const fc = flagged.flat().filter(Boolean).length;
  document.getElementById('mine-count').textContent = lcd(cfg.mines - fc);
  renderAll();
}

function lose(hr, hc) {
  state = 'lost'; clearInterval(timerId);
  document.getElementById('reset-btn').textContent = '😵';
  revealed[hr][hc] = true;
  renderAll();
}

function checkWin() {
  const { rows, cols } = cfg;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!revealed[r][c] && board[r][c] !== -1) return;
  state = 'won'; clearInterval(timerId);
  document.getElementById('reset-btn').textContent = '😎';
  document.getElementById('mine-count').textContent = '000';
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (board[r][c] === -1) { flagged[r][c] = true; question[r][c] = false; }
}

function cellInfo(r, c) {
  if (state === 'lost') {
    if (board[r][c] === -1) {
      if (revealed[r][c]) return ['mine-hit', '💣'];
      if (flagged[r][c])  return ['closed', '🚩'];
      return ['mine-show', '💣'];
    }
    if (flagged[r][c]) return ['wrong-flag', '❌'];
  }
  if (flagged[r][c])  return ['closed', '🚩'];
  if (question[r][c]) return ['closed', '?'];
  if (!revealed[r][c]) return ['closed', ''];
  if (board[r][c] === 0) return ['open', ''];
  if (board[r][c] === -1) return ['open', '💣'];
  return [`open n${board[r][c]}`, String(board[r][c])];
}

function buildDOM() {
  const { rows, cols } = cfg;
  const el = document.getElementById('board');
  let html = '';
  for (let r = 0; r < rows; r++) {
    html += '<div class="row">';
    for (let c = 0; c < cols; c++) {
      const [cls, txt] = cellInfo(r, c);
      html += `<div class="cell ${cls}" data-r="${r}" data-c="${c}">${txt}</div>`;
    }
    html += '</div>';
  }
  el.innerHTML = html;

  el.addEventListener('click', e => {
    const cell = e.target.closest('.cell');
    if (cell) onLeft(+cell.dataset.r, +cell.dataset.c);
  });
  el.addEventListener('contextmenu', e => {
    const cell = e.target.closest('.cell');
    if (cell) onRight(e, +cell.dataset.r, +cell.dataset.c);
  });
  el.addEventListener('mousedown', e => {
    if (e.button === 0 && state === 'playing')
      document.getElementById('reset-btn').textContent = '😮';
  });
  el.addEventListener('mouseup', () => {
    if (state === 'playing')
      document.getElementById('reset-btn').textContent = '🙂';
  });
}

function renderAll() {
  const el = document.getElementById('board');
  const cells = el.querySelectorAll('.cell');
  const { cols } = cfg;
  cells.forEach(cell => {
    const r = +cell.dataset.r, c = +cell.dataset.c;
    const [cls, txt] = cellInfo(r, c);
    cell.className = `cell ${cls}`;
    cell.textContent = txt;
  });
}

newGame();
</script>
</body>
</html>
